<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set! Card Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="topbar">
        <h1>SET!</h1>
        <nav class="topnav">
            <a href="help.html" class="link-btn">Help</a>
            <button id="theme-toggle" class="link-btn" title="Switch theme" aria-label="Switch theme">☀️</button>
        </nav>
        <div class="me" id="me"></div>
    </div>

    <section id="game" class="view">
        <div class="toolbar">
            <button id="leave-btn" class="ghost">&larr; Leave Game</button>
            <div class="game-name" id="game-name"></div>
            <button id="hint-btn"><span id="hint-label">Hint</span><span id="hint-badge" class="hint-badge" hidden></span></button>
            <div class="toolbar-stats">
                <div class="stat highlight"><span class="value" id="stat-sets">0</span>Your Sets</div>
                <div class="stat"><span class="value" id="stat-deck">81</span>Deck</div>
            </div>
        </div>

        <div class="players" id="players"></div>
        <div id="board"></div>
        <div id="message" class="message"></div>
    </section>

    <script src="js/renderer.js?v=13"></script>
    <script src="js/client.js?v=13"></script>
    <script src="js/game.js?v=13"></script>
</body>
</html>
